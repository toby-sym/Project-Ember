name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

env:
  BASE_VERSION: 0.1.0

permissions:
  contents: write

jobs:
  editmode-tests:
    name: EditMode Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-test-${{ runner.os }}-${{ hashFiles('Packages/manifest.json', 'Packages/packages-lock.json', 'ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-${{ runner.os }}-

      - name: Run EditMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          projectPath: .
          unityVersion: 6000.3.7f1
          testMode: editmode
          artifactsPath: test-results/editmode
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: editmode-test-results
          path: test-results/editmode

  release-windows:
    name: Build And Release Windows
    runs-on: ubuntu-latest
    needs: editmode-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Compute release version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.tag }}"
            prerelease="false"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            version="${{ github.ref_name }}"
            prerelease="false"
          else
            version="v${{ env.BASE_VERSION }}-alpha.${{ github.run_number }}"
            prerelease="true"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"
          echo "Computed version: ${version} (prerelease=${prerelease})"

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-release-${{ runner.os }}-${{ hashFiles('Packages/manifest.json', 'Packages/packages-lock.json', 'ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-release-${{ runner.os }}-
            Library-build-${{ runner.os }}-
            Library-${{ runner.os }}-

      - name: Build Windows player
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          PROJECT_EMBER_VERSION: ${{ steps.version.outputs.version }}
        with:
          projectPath: .
          unityVersion: 6000.3.7f1
          targetPlatform: StandaloneWindows64
          buildsPath: Builds
          buildName: ProjectEmber
          buildMethod: ProjectEmber.Editor.ProjectEmberBuildAutomation.BuildWindows64

      - name: Package Windows build
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          cd Builds
          zip -r "../ProjectEmber-${version}-Windows.zip" StandaloneWindows64

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Project Ember ${{ steps.version.outputs.version }}
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: ProjectEmber-*-Windows.zip

      - name: Upload packaged release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProjectEmber-Windows-Release
          path: ProjectEmber-*-Windows.zip
